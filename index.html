<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Search Harry Potter characters by name or house."
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Harry Potter characters search</title>
  </head>
  <body>
    <div class="bg-orb bg-orb--violet" aria-hidden="true"></div>
    <div class="bg-orb bg-orb--blue" aria-hidden="true"></div>
    <main class="container">
      <section class="hero glass-panel">
        <div class="hero__topbar">
          <p class="eyebrow">Wizarding index</p>
          <button
            type="button"
            class="theme-toggle"
            id="themeToggle"
            aria-label="Switch to dark mode"
            aria-pressed="false"
          >
            <span class="theme-toggle__emoji" aria-hidden="true">🌙</span>
            <span class="theme-toggle__label">Dark</span>
          </button>
        </div>
        <h1>Harry Potter Characters</h1>
      </section>

      <section class="controls glass-panel">
        <div id="searchWrapper">
          <label class="sr-only" for="searchBar">Search characters</label>
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            type="search"
            name="searchBar"
            id="searchBar"
            placeholder="Search for a character or house"
            autocomplete="off"
            aria-describedby="resultsStatus"
          />
        </div>
        <div class="controls__toolbar">
          <div class="quick-filters" aria-label="Quick filters">
            <button type="button" class="filter-chip" data-filter="">All</button>
            <button type="button" class="filter-chip" data-filter="gryffindor">Gryffindor</button>
            <button type="button" class="filter-chip" data-filter="slytherin">Slytherin</button>
            <button type="button" class="filter-chip" data-filter="ravenclaw">Ravenclaw</button>
            <button type="button" class="filter-chip" data-filter="hufflepuff">Hufflepuff</button>
          </div>
          <div class="sort-group">
            <label class="sr-only" for="sortSelect">Sort characters</label>
            <select id="sortSelect" class="sort-select" aria-label="Sort characters">
              <option value="default">Sort: Default</option>
              <option value="name-asc">Name: A to Z</option>
              <option value="name-desc">Name: Z to A</option>
              <option value="house-asc">House: A to Z</option>
              <option value="house-desc">House: Z to A</option>
            </select>
          </div>
        </div>
        <p id="resultsStatus" class="status" aria-live="polite"></p>
      </section>

      <ul id="charactersList" aria-label="Harry Potter characters"></ul>
    </main>

    <div class="character-modal" id="characterModal" hidden>
      <div class="character-modal__backdrop" data-close-modal></div>
      <div
        class="character-modal__dialog glass-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <button
          type="button"
          class="character-modal__close"
          id="closeModalButton"
          aria-label="Close character details"
        >
          ×
        </button>
        <div class="character-modal__content" id="modalContent"></div>
      </div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
