<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Search Harry Potter characters by name or house."
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Harry Potter characters search</title>
  </head>
  <body>
    <main class="container">
      <h1>🪄 Harry Potter Characters 🪄</h1>
      <div id="searchWrapper">
        <label class="sr-only" for="searchBar">Search characters</label>
        <input
          type="search"
          name="searchBar"
          id="searchBar"
          placeholder="Search for a character or house"
          class="shadow"
          autocomplete="off"
          aria-describedby="resultsStatus"
        />
      </div>
      <p id="resultsStatus" class="status" aria-live="polite"></p>
      <ul id="charactersList" aria-label="Harry Potter characters"></ul>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
